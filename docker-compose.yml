services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mbs_app
    restart: always
    volumes:
      - .:/var/www

  nginx:
    image: nginx:alpine
    container_name: mbs_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
